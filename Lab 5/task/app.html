<h1>KASPI STORE</h1>

<div class="categories">
  <button
    *ngFor="let category of categories"
    (click)="selectCategory(category)"
    [class.active]="selectedCategory?.id === category.id"
  >
    {{ category.name }}
  </button>
</div>

<div *ngIf="!selectedCategory">
  <p>Please select a category</p>
</div>

<app-product-list
  *ngIf="selectedCategory"
  [products]="products">
</app-product-list>
